    <style id="reset-css">
        @layer figreset, figoverridable, reset, theme, base, figutils, components, utilities;

        @layer figoverridable {
            :root {
                font-synthesis: none
            }
        }

        @layer figutils {
            :root {
                --banner-height: 48px;
                --banner-height-v2: 40px;
                --full-height-with-banner: calc(100dvh - var(--banner-height))
            }

            @media (max-width:600px) {
                .banner-v2-container {
                    left: 0 !important;
                    right: 0 !important;
                    margin: 0 auto !important
                }
            }

            .wrapper-with-banner .min-h-screen {
                min-height: var(--full-height-with-banner)
            }

            .wrapper-with-banner .h-screen {
                height: var(--full-height-with-banner)
            }
        }

        @layer figreset {
            :root {
                /* MODIFICATO: Impostato SF Pro Display come font principale globale */
                --default-font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
                font-family: var(--default-font-family)
            }

            html {
                -webkit-text-size-adjust: 100%;
                -webkit-tap-highlight-color: transparent;
                -webkit-font-smoothing: antialiased;
                width: 100%
            }

            body {
                margin: 0;
                width: 100%;
                /* MODIFICATO: Forzato il font globale anche sul body */
                font-family: var(--default-font-family);
            }

            body:has([data-page-overflowx='hidden']) {
                overflow-x: hidden
            }

            body:has([data-page-overflowx='auto']) {
                overflow-x: auto
            }
        }

        @layer figutils {
            #container {
                width: 100%
            }
        }

        @layer figreset {

            *,
            *:before,
            *:after {
                box-sizing: border-box
            }

            a {
                color: inherit;
                text-decoration: none
            }

            button {
                border: none;
                background: none;
                padding: 0;
                cursor: pointer;
                font-family: inherit;
                /* MODIFICATO: i bottoni ereditano il font corretto */
            }

            h1,
            h2,
            h3,
            h4,
            h5,
            h6,
            p {
                font-size: inherit;
                font-weight: inherit
            }

            blockquote,
            dl,
            dd,
            h1,
            h2,
            h3,
            h4,
            h5,
            h6,
            hr,
            figure,
            p,
            pre {
                margin: 0
            }

            ol,
            ul,
            menu {
                list-style: none;
                margin: 0;
                padding-inline-start: 0
            }
        }

        @layer figutils {
            :is(.textContents ul, ul.textContents)>li:before {
                content: '\2022';
                margin-left: -1.5em;
                display: inline-block;
                text-align: center;
                width: 1.5em;
                -webkit-background-clip: var(--list-marker-background-clip);
                -webkit-text-fill-color: var(--list-marker-text-fill-color);
                background-clip: var(--list-marker-background-clip);
                color: var(--list-marker-color);
                font-size: var(--list-marker-font-size);
                line-height: var(--list-marker-line-height);
                vertical-align: var(--list-marker-vertical-align)
            }

            :is(.textContents ol, ol.textContents)>li::marker {
                color: var(--list-marker-color);
                font-size: var(--list-marker-font-size);
                line-height: var(--list-marker-line-height);
                vertical-align: var(--list-marker-vertical-align)
            }

            :is(.textContents, .textContents *).adjustLetterSpacing:after {
                content: '';
                margin-left: calc(var(--letter-spacing) * -1)
            }
        }

        @layer figutils {
            #container .embed {
                border: none
            }
        }

        @layer figreset {
            :root {
                --100dvw: 100vw;
                --100dvh: 100vh
            }

            @supports (width:100dvw) {
                :root {
                    --100dvw: 100dvw;
                    --100dvh: 100dvh
                }
            }
        }
    </style>

        .desktop-icon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            text-align: center;

            z-index: 10;
        }

        .desktop-icon img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 6px;

            transition: transform 0.2s ease;
        }

        .desktop-icon span {
            color: #ffffff;
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            font-weight: 500;
            text-shadow: 0px 1px 3px rgba(0, 0, 0, 0.8);

        }

        .desktop-icon:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 6px;

        }

        .desktop-icon:hover img {

        }

        /* --- STILI DASHBOARD VERTICALE INTERFACCIA APPLE NATIVA --- */
        .widgy-unified-dashboard {
            z-index: 30;
            /* MODIFICATO: Riordinato l'ordine dando priorità assoluta a SF Pro Display */
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 338px;
        }

        /* 1. OROLOGIO ORIZZONTALE SNELLO (CENTRATO) */

        .apple-clock-widget.flip-clock-container {
            width: 100%;
            height: 90px;
            /* Leggermente più alto per accogliere il design */
            background-color: #1e1e1e !important;
            /* Rosso vintage brillante */
            border: 4px solid #2b2b2b;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 2px 6px rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0px;
            box-sizing: border-box;
        }

        /* Griglia dell'orologio */
        .flip-clock {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Singola tessera/paletta dell'orologio */
        .flip-card {
            position: relative;
            width: 60px;
            height: 64px;
            background: #C0DF97;
            /* Arancione retroilluminato */
            border-radius: 10px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4), 0 4px 8px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #5d7b8b;
        }

        /* Linea orizzontale centrale che taglia a metà la cifra */
        .flip-card::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* Cifre stile digitale/retro */
        .flip-card-inner {
            font-family: "SF Pro Display", -apple-system, sans-serif;
            font-size: 42px;
            font-weight: 800;
            color: #1e1e1e;
            /* Grigio scuro/Nero fumo opaco */
            line-height: 1;
            z-index: 1;
            letter-spacing: -1px;
        }

        /* Separatori dei due punti (:) */
        .flip-separator {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            animation: blink 1s infinite;
            /* Effetto lampeggiante opzionale */
        }

        @keyframes blink {
            50% {
                opacity: 0.4;
            }
        }


        /* CALENDARIO RETTANGOLARE AGGIORNATO */
        .apple-calendar-rectangle {
            width: 100%;
            height: 156px;
            background: #1e1e1e !important;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            box-sizing: border-box;
            display: flex;
            padding: 14px 18px;
            gap: 16px;
        }

        .cal-left-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 110px;
            flex-shrink: 0;
            height: 100%;
            padding-right: 4px;
        }

        .cal-left-panel .cal-header-month {
            font-size: 20px;
            font-weight: 700 !important;
            font-style: normal;
            color: #C0DF97;
            letter-spacing: 0.5px;
            text-transform: none;
            line-height: 1.1;

        }

        .cal-left-panel .cal-number-big {
            font-size: 68px;
            font-weight: 900;
            color: #ffffff;
            line-height: 0.85;
            letter-spacing: -3px;
            margin-top: -2px;
            margin-bottom: -2px;
        }

        .cal-left-bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-top: 2px;
        }

        .cal-left-bottom-row .cal-day-name-sub {
            font-size: 14px;
            font-weight: 900;
            color: #ffffff;
            text-transform: none;
        }

        .cal-left-bottom-row .cal-weather-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .cal-left-bottom-row .cal-weather-info svg {
            width: 16px;
            height: 16px;
            fill: #ffe148;
        }

        .cal-right-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .cal-grid-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            border-bottom: 1px solid #727276;
            padding-bottom: 4px;
        }

        .cal-grid-weekdays span {
            font-size: 15px;
            font-weight: 900;
            color: #ffffff;
        }

        .cal-grid-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 3px 0;
            text-align: center;
            align-items: center;
            flex-grow: 1;
            padding-top: 4px;
        }

        .cal-grid-days span {
            font-size: 11px;
            font-weight: 700;
            color: #727276;
            height: 18px;
            width: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .cal-grid-days span.current-month-day {
            color: #ffffff;
        }

        .cal-grid-days span.active-today-circle {
            background-color: #C0DF97;
            color: #1e1e1e !important;
            border-radius: 50%;
            font-weight: 700;
        }

        /* 3. SPOTIFY SECTION */
        .widgy-spotify-section {
            width: 100%;
        }

        .widgy-spotify-section iframe {
            width: 100%;
            height: 152px !important;
            border: none;
            display: block;
            border-radius: 15px !important;
        }

        /* 4. NUOVA SEZIONE ADDIZIONALE: ZONA DUE QUADRATI FOTO AFFIANCATI */
        .widgy-images-row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .widgy-square-widget {
            flex: 1;
            aspect-ratio: 1 / 1;
            background-color: rgba(30, 30, 30, 0.65) !important;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);

            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .widgy-square-widget img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* FINESTRE DI SISTEMA */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .mac-window {
            width: 900px;
            max-width: 95%;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .mac-window {
            transform: scale(1);
        }

        .mac-header {
            background-color: #f6f6f6;
            height: 36px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
            border-bottom: 1px solid #dcdcdc;
            user-select: none;
            flex-shrink: 0;
        }

        .mac-buttons {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 16px;
        }

        .mac-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .mac-btn.red {
            background-color: #ff5f56;
            border: 0.5px solid #e0443e;
        }

        .mac-btn.yellow {
            background-color: #ffbd2e;
            border: 0.5px solid #dea123;
            cursor: default;
        }

        .mac-btn.green {
            background-color: #27c93f;
            border: 0.5px solid #1aab29;
            cursor: default;
        }

        .mac-title {
            width: 100%;
            text-align: center;
            color: #4a4a4a;
            /* MODIFICATO: Forzato SF Pro Display anche nel titolo delle finestre stile Mac */
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            font-weight: 700;
        }

        .mac-content {
            height: 75vh;
            overflow-y: auto;
            background: #ffffff;
            padding: 30px;
            padding-top: 60px;
            box-sizing: border-box;
        }

        .mac-content img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            image-rendering: -webkit-optimize-contrast;
        }

        #modal-patpat .mac-content {
            padding: 60px 0px 30px 0px;
            box-sizing: border-box;
        }

        #modal-patpat .mac-content img {
            width: 100%;
            height: auto;
            display: block;
        }

        #modal-aboutme .mac-content {
            padding-top: 20px !important;
        }
    </style>
</head>

    <script>
        function generaGrigliaCalendario(dataAttuale) {
            const gridContainer = document.getElementById('cal-days-grid');
            if (!gridContainer) return;
            gridContainer.innerHTML = '';

            const anno = dataAttuale.getFullYear();
            const mese = dataAttuale.getMonth();
            const oggi = dataAttuale.getDate();

            const primoGiornoMese = new Date(anno, mese, 1);
            let giornoSettimanaInizio = primoGiornoMese.getDay() - 1;
            if (giornoSettimanaInizio === -1) giornoSettimanaInizio = 6;

            const totaleGiorniMese = new Date(anno, mese + 1, 0).getDate();
            const totaleGiorniMesePrecedente = new Date(anno, mese, 0).getDate();

            for (let i = giornoSettimanaInizio - 1; i >= 0; i--) {
                const span = document.createElement('span');
                span.textContent = totaleGiorniMesePrecedente - i;
                gridContainer.appendChild(span);
            }

            for (let giorno = 1; giorno <= totaleGiorniMese; giorno++) {
                const span = document.createElement('span');
                span.textContent = giorno;
                span.classList.add('current-month-day');

                if (giorno === oggi) {
                    span.classList.add('active-today-circle');
                }
                gridContainer.appendChild(span);
            }

            const celleTotali = gridContainer.children.length;
            const celleMancanti = celleTotali <= 35 ? 35 - celleTotali : 42 - celleTotali;
            for (let giornoSuccessivo = 1; giornoSuccessivo <= celleMancanti; giornoSuccessivo++) {
                const span = document.createElement('span');
                span.textContent = giornoSuccessivo;
                gridContainer.appendChild(span);
            }
        }

        function aggiornaTempo() {
            const oraAttuale = new Date();

            let ore = String(oraAttuale.getHours()).padStart(2, '0');
            let minutes = String(oraAttuale.getMinutes()).padStart(2, '0');
            let secondi = String(oraAttuale.getSeconds()).padStart(2, '0');

            // Aggiorna le singole tessere del flip clock
            const pHours = document.getElementById('flip-hours');
            const pMinutes = document.getElementById('flip-minutes');
            const pSeconds = document.getElementById('flip-seconds');

            if (pHours) pHours.textContent = ore;
            if (pMinutes) pMinutes.textContent = minutes;
            if (pSeconds) pSeconds.textContent = secondi;

            // ... Lascia invariato tutto il codice sottostante riguardante il calendario ...
            let opzioniMese = { month: 'long' };
            let opzioniNomeGiorno = { weekday: 'long' };
            let nomeMese = oraAttuale.toLocaleDateString('it-IT', opzioniMese);
            let numeroGiorno = oraAttuale.getDate();
            let nomeGiorno = oraAttuale.toLocaleDateString('it-IT', opzioniNomeGiorno);

            document.getElementById('cal-month-left').textContent = nomeMese;
            document.getElementById('cal-day-left').textContent = numeroGiorno;
            document.getElementById('cal-dayname-left').textContent = nomeGiorno.substring(0, 3) + '.';

            generaGrigliaCalendario(oraAttuale);
        }
